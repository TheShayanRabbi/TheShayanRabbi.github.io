<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shayan Rabbi | Executive Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'paper': '#F4F1E8',
                        'ibm-dark': '#2B1B17',
                        'ibm-amber': '#FF9F1C',
                        'ibm-red': '#BC4749',
                    },
                    fontFamily: {
                        'garamond': ['EB Garamond', 'serif'],
                        'trebuchet': ['Trebuchet MS', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        /* The Dot Grid Pattern from your slide */
        body {
            background-color: #F4F1E8;
            background-image: radial-gradient(#2B1B17 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            /* Adjust for grid density */
            color: #2B1B17;
        }

        /* The IBM "Sign" Effect */
        .logo-box {
            background-color: #FDFBF7;
            border: 2px solid #2B1B17;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 0px #2B1B17;
        }

        .logo-box:hover {
            background-color: #FF9F1C;
            /* Amber Glow */
            box-shadow: 0px 0px 20px rgba(255, 159, 28, 0.6);
            transform: translate(2px, 2px);
        }

        .name-stack {
            line-height: 0.8;
            letter-spacing: -0.02em;
        }

        /* Separation Line */
        .separator {
            border: none;
            height: 1px;
            background: repeating-linear-gradient(90deg, #2B1B17, #2B1B17 4px, transparent 4px, transparent 8px);
            opacity: 0.3;
        }
    </style>
</head>

<body class="font-trebuchet selection:bg-ibm-amber">

    <nav class="max-w-6xl mx-auto px-8 py-10">
        <div class="flex items-center text-xs tracking-[0.2em] uppercase font-bold">
            <a href="/" class="logo-box px-3 py-1 mr-10 text-sm tracking-normal">SR</a>

            <div class="flex space-x-10 opacity-80">
                <a class="hover:text-ibm-red transition-colors cursor-pointer">Projects</a>
                <a class="hover:text-ibm-red transition-colors cursor-pointer">Library</a>
                <a class="hover:text-ibm-red transition-colors cursor-pointer">Writing</a>
                <a class="hover:text-ibm-red transition-colors cursor-pointer">Chatting!</a>
            </div>
        </div>
        <hr class="separator mt-8">
    </nav>

    <main class="max-w-6xl mx-auto px-8 py-20">

        <header class="mb-24">
            <p class="text-[10px] tracking-[0.4em] uppercase opacity-50 mb-8">Executive Status Report — 2026</p>

            <h1
                class="font-garamond text-8xl md:text-[12rem] font-bold text-ibm-red name-stack hover:text-ibm-dark transition-colors duration-700 cursor-default">
                SHAYAN<br>RABBI
            </h1>
        </header>

        <section class="max-w-2xl border-l-2 border-ibm-red pl-8 py-2">
            <h2 class="text-sm font-bold uppercase tracking-widest mb-4"> The Update</h2>
            <p class="font-garamond text-2xl leading-relaxed italic opacity-90">
                Building digital infrastructure at the intersection of human intuition and machine intelligence.
            </p>
        </section>

    </main>

    <footer class="max-w-6xl mx-auto px-8 py-20 opacity-30 text-[10px] tracking-widest uppercase">
        Toronto Data Centre // 43.6532° N, 79.3832° W
    </footer>

</body>

</html>
